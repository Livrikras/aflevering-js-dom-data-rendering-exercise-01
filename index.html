<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>CineFlex Movies</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>CineFlex Movies</h1>
    <!-- Filtrering af perioder -->
    <form>
      <label for="category-select">Vælg Genre</label>
      <select id="category-select">
        <option value="alle">Alle</option>
        <option value="action">Action</option>
        <option value="comedy">Comedy</option>
        <option value="drama">Drama</option>
        <option value="horror">Horror</option>
        <option value="science-fiction">Science Fiction</option>
      </select>

      <!-- submit label -->
      <label for="gsearch">Søg</label>
      <input type="search" name="gsearch" id="gsearch" />
      <input type="submit" value="søg" />
    </form>

    <section id="movies-container"></section>
    <script src="js/movies-script.js"></script>
</body>
</html>
